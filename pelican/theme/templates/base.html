<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG|default('pt-br') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ SITENAME }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ SITE_DESCRIPTION }}{% endblock description %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css">
  {% block head_extra %}{% endblock head_extra %}
</head>
<body class="{% block body_class %}{% endblock body_class %}">
  {% include "partials/navigation.html" %}
  <main class="site-main">
    {% block content %}{% endblock content %}
  </main>
  {% include "partials/footer.html" %}
  <script src="{{ SITEURL }}/theme/js/site.js" defer></script>
  {% if MATHJAX_ENABLED %}
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
  {% endif %}
  {% block scripts %}{% endblock scripts %}
</body>
</html>
