<nav id="nav">
  <a href="{{ SITEURL }}/" class="nav-brand">
    <span class="brand-symbol">α</span>
    <span class="brand-text">{{ SITENAME }}</span>
  </a>
  <ul class="nav-links" id="nav-links">
    {% for item in NAV_ITEMS %}
    <li>
      <a href="{% if item.url.startswith('http') %}{{ item.url }}{% elif item.url %}{{ SITEURL }}/{{ item.url }}{% else %}{{ SITEURL }}/{% endif %}"{% if item.is_cta %} class="nav-cta"{% endif %}>
        {{ item.label }}
      </a>
    </li>
    {% endfor %}
  </ul>
  <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
